<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Property Tooltip — Umbraco package logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A centered logo featuring a stylized UI property panel with a tooltip bubble above and to the right, tail pointing down to the i icon.</desc>

  

  <!-- Outer card / property panel -->
  <rect x="170" y="80" width="240" height="260" rx="16" fill="#f5f5fa" stroke="#e0e0ec" stroke-width="1.5" style="fill:rgb(245, 245, 250);stroke:rgb(224, 224, 236);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Property row 1 -->
  <rect x="194" y="110" width="70" height="10" rx="4" fill="#c8c8dc" opacity="0.7" style="fill:rgb(200, 200, 220);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="194" y="128" width="192" height="28" rx="6" fill="#ffffff" stroke="#ddd" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(221, 221, 221);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Property row 2 -->
  <rect x="194" y="172" width="70" height="10" rx="4" fill="#c8c8dc" opacity="0.7" style="fill:rgb(200, 200, 220);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="194" y="190" width="192" height="28" rx="6" fill="#ffffff" stroke="#ddd" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(221, 221, 221);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Property row 3 — active -->
  <rect x="194" y="234" width="70" height="10" rx="4" fill="#f05c94" opacity="0.9" style="fill:rgb(240, 92, 148);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="194" y="252" width="192" height="28" rx="6" fill="#ffffff" stroke="#f05c94" stroke-width="2" style="fill:rgb(255, 255, 255);stroke:rgb(240, 92, 148);color:rgb(0, 0, 0);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- "i" icon at cx=273, cy=238 -->
  <circle cx="273" cy="238" r="9" fill="#f05c94" style="fill:rgb(240, 92, 148);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="273" y="243" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="12" fill="#fff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:auto">i</text>

  <!-- === TOOLTIP BUBBLE — upper right, tail points down to i icon === -->
  <!-- Bubble: x=316, y=100, width=210, height=96 -->
  <rect x="316" y="100" width="210" height="96" rx="10" fill="#1a1a2e" style="fill:rgb(26, 26, 46);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tail: bottom of bubble pointing down-left to i icon (273, 229 = top of icon) -->
  <!-- Base on bubble bottom around x=336, tip at i icon top -->
  <polygon points="326,196 356,196 273,229" fill="#1a1a2e" style="fill:rgb(26, 26, 46);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Package name -->
  <text x="336" y="128" font-family="sans-serif" font-weight="700" font-size="14" fill="#ffffff" letter-spacing="0.2" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:14px;font-weight:700;text-anchor:start;dominant-baseline:auto">Property <tspan fill="#f05c94" style="fill:rgb(240, 92, 148);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:14px;font-weight:700;text-anchor:start;dominant-baseline:auto">Tooltip</tspan></text>

  <!-- Divider -->
  <rect x="336" y="135" width="170" height="1.5" rx="1" fill="#f05c94" opacity="0.4" style="fill:rgb(240, 92, 148);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Description — 2 lines -->
  <text x="336" y="152" font-family="sans-serif" font-weight="400" font-size="11" fill="#aab0c0" style="fill:rgb(170, 176, 192);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">Add helpful tooltips to your</text>
  <text x="336" y="167" font-family="sans-serif" font-weight="400" font-size="11" fill="#aab0c0" style="fill:rgb(170, 176, 192);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">content properties.</text>

  <!-- Dot accent -->
  <circle cx="336" cy="113" r="4" fill="#f05c94" opacity="0.7" style="fill:rgb(240, 92, 148);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>